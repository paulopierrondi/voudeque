name: iOS Release — Build & Upload to TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ./ios
        run: xcodegen generate

      - name: Build & Archive
        working-directory: ./ios
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcodebuild -project VouDeQue.xcodeproj \
            -scheme VouDeQue \
            -sdk iphoneos \
            -configuration Release \
            -allowProvisioningUpdates \
            archive -archivePath build/VouDeQue.xcarchive

      - name: Export IPA
        working-directory: ./ios
        run: |
          xcodebuild -exportArchive \
            -archivePath build/VouDeQue.xcarchive \
            -exportPath build \
            -exportOptionsPlist exportOptions.plist

      - name: Upload to TestFlight
        working-directory: ./ios
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f build/VouDeQue.ipa \
            -t ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
